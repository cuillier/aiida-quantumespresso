default_inputs:
    clean_workdir: False
    alpha_start: 0.25
    efield_strength: 0.001
    full_dielectric_tensor: True
    convergence_threshold: 0.05
    max_iterations: 10
default_protocol: balanced
protocols:
    balanced:
        description: 'Protocol to perform a sc-DDH calculation at normal precision at moderate computational cost.'
    stringent:
        description: 'Protocol to perform a sc-DDH calculation at high precision at higher computational cost.'
    fast:
        description: 'Protocol to perform a sc-DDH calculation at low precision at minimal computational cost for testing purposes.'
meta_inputs_schema:
    scf: &pw_base_meta
        meta_parameters:
            conv_thr_per_atom:
            etot_conv_thr_per_atom:
        pseudo_family:
